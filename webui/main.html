<div class="x-dashboard" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color, #e0e0e0);">
        <h3 style="margin: 0; color: #1d9bf0;">X.com Integration</h3>
        <span data-xm="status-badge" style="padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fce4ec; color: #c62828;">Checking...</span>
    </div>

    <!-- Connection Info -->
    <div data-xm="user-info" style="display: none; margin-bottom: 16px; padding: 12px; background: var(--bg-secondary, #f5f5f5); border-radius: 8px;">
        <div style="font-weight: 600; font-size: 13px;" data-xm="user-name"></div>
        <div style="font-size: 12px; color: var(--text-secondary, #888); margin-top: 4px;">
            Tier: <span data-xm="tier-label" style="font-weight: 600; text-transform: capitalize;"></span>
        </div>
    </div>

    <!-- Usage Stats -->
    <div data-xm="usage-section" style="display: none; margin-bottom: 16px;">
        <h4 style="margin: 0 0 8px 0; font-size: 13px; color: var(--text-secondary, #888);">This Month's Usage</h4>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-secondary, #f5f5f5); border-radius: 6px; text-align: center;">
                <div style="font-size: 22px; font-weight: 700; color: #1d9bf0;" data-xm="tweets-count">0</div>
                <div style="font-size: 11px; color: var(--text-secondary, #888);">Tweets Posted</div>
            </div>
            <div style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-secondary, #f5f5f5); border-radius: 6px; text-align: center;">
                <div style="font-size: 22px; font-weight: 700; color: #1d9bf0;" data-xm="budget-remaining">0</div>
                <div style="font-size: 11px; color: var(--text-secondary, #888);">Budget Remaining</div>
            </div>
        </div>
        <!-- Progress bar -->
        <div style="margin-top: 8px; height: 6px; background: var(--bg-secondary, #e0e0e0); border-radius: 3px; overflow: hidden;">
            <div data-xm="usage-bar" style="height: 100%; background: #1d9bf0; border-radius: 3px; transition: width 0.3s; width: 0%;"></div>
        </div>
        <div style="text-align: right; font-size: 10px; color: var(--text-secondary, #888); margin-top: 2px;" data-xm="usage-pct"></div>
    </div>

    <!-- Actions -->
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button data-xm="test-btn" onclick="window._xcMain.testConnection()" style="background: #1d9bf0; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Test Connection</button>
        <button data-xm="refresh-btn" onclick="window._xcMain.refresh()" style="background: var(--bg-secondary, #e0e0e0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Refresh</button>
    </div>

    <!-- Services Status -->
    <div style="margin-top: 16px;">
        <h4 style="margin: 0 0 8px 0; font-size: 13px; color: var(--text-secondary, #888);">Services</h4>
        <div data-xm="services" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; font-size: 12px;"></div>
    </div>
</div>

<script>
(function() {
    function fetchApi(url, opts) { return (globalThis.fetchApi || fetch)(url, opts); }
    var API_TEST = '/api/plugins/x/x_test';
    var API_CONFIG = '/api/plugins/x/x_config_api';

    var root = document.querySelector('.x-dashboard')
            || document.currentScript?.parentElement;
    if (!root) { console.error('x dashboard: root not found'); return; }

    function $(sel) { return root.querySelector('[data-xm="' + sel + '"]'); }

    const SERVICES = [
        {key: 'posting', label: 'Posting', tier: 'free'},
        {key: 'reading', label: 'Reading', tier: 'pay_per_use'},
        {key: 'search', label: 'Search', tier: 'pay_per_use'},
        {key: 'media', label: 'Media', tier: 'free'},
        {key: 'analytics', label: 'Analytics', tier: 'pay_per_use'},
    ];

    function renderServices(config) {
        const el = $('services');
        const tier = (config._tier || 'pay_per_use').toLowerCase();
        const tierOrder = {free: 0, pay_per_use: 1, basic: 1, pro: 2};
        const currentLevel = tierOrder[tier] || 0;
        const services = config.services || {};

        el.innerHTML = SERVICES.map(s => {
            const svc = services[s.key] || {};
            const enabled = svc.enabled !== false;
            const tierOk = currentLevel >= (tierOrder[s.tier] || 0);
            const active = enabled && tierOk;
            const color = active ? '#2e7d32' : '#c62828';
            const bg = active ? '#e8f5e9' : '#fce4ec';
            const tierLabel = s.tier === 'pay_per_use' ? 'paid tier' : s.tier + ' tier';
            const label = active ? 'Active' : (!tierOk ? tierLabel : 'Off');
            return '<div style="padding:6px 8px;background:' + bg + ';color:' + color + ';border-radius:4px;text-align:center;">'
                + '<div style="font-weight:600;">' + s.label + '</div>'
                + '<div style="font-size:10px;">' + label + '</div></div>';
        }).join('');
    }

    async function loadDashboard() {
        try {
            const resp = await fetchApi(API_CONFIG);
            const config = await resp.json();
            if (config.error) return;

            renderServices(config);

            if (config._usage) {
                $('usage-section').style.display = '';
                const posted = config._usage.tweets_posted || 0;
                const limit = config._usage.monthly_limit || 1500;
                const remaining = Math.max(0, limit - posted);
                const pct = Math.min(100, (posted / limit) * 100);

                $('tweets-count').textContent = posted.toLocaleString();
                $('budget-remaining').textContent = remaining.toLocaleString();
                $('usage-bar').style.width = pct + '%';
                $('usage-bar').style.background = pct > 90 ? '#c62828' : (pct > 75 ? '#e65100' : '#1d9bf0');
                $('usage-pct').textContent = pct.toFixed(1) + '% of ' + limit.toLocaleString();
            }
        } catch (e) {
            console.error('Dashboard load error:', e);
        }
    }

    async function testConnection() {
        const badge = $('status-badge');
        badge.textContent = 'Testing...';
        badge.style.background = '#fff3e0';
        badge.style.color = '#e65100';
        try {
            const resp = await fetchApi(API_TEST, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: '{}'
            });
            const data = await resp.json();
            if (data.ok) {
                badge.textContent = 'Connected';
                badge.style.background = '#e8f5e9';
                badge.style.color = '#2e7d32';
                $('user-info').style.display = '';
                $('user-name').textContent = data.user || 'Connected';
                var tierDisplay = (data.tier || 'pay_per_use').replace('pay_per_use', 'Pay-Per-Use');
                $('tier-label').textContent = tierDisplay;
            } else {
                badge.textContent = data.error || 'Error';
                badge.style.background = '#fce4ec';
                badge.style.color = '#c62828';
                $('user-info').style.display = 'none';
            }
        } catch (e) {
            badge.textContent = 'API unavailable';
            badge.style.background = '#fce4ec';
            badge.style.color = '#c62828';
        }
    }

    function refresh() { testConnection(); loadDashboard(); }

    window._xcMain = { testConnection: testConnection, refresh: refresh };
    setTimeout(function() { testConnection(); loadDashboard(); }, 50);
})();
</script>
