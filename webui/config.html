<html>
<head><title>X.com</title></head>
<body>
    <div x-data="{ activeTab: 'auth', oauth2Status: '', oauth2StatusColor: '', oauth2CallbackVisible: false, oauth2CallbackStatus: '', oauth2CallbackStatusColor: '' }" x-init="
        if (!config.tier) config.tier = 'pay_per_use';
        if (!config.oauth1) config.oauth1 = {};
        if (!config.oauth1.api_key) config.oauth1.api_key = '';
        if (!config.oauth1.api_secret) config.oauth1.api_secret = '';
        if (!config.oauth1.access_token) config.oauth1.access_token = '';
        if (!config.oauth1.access_token_secret) config.oauth1.access_token_secret = '';
        if (!config.oauth2) config.oauth2 = {};
        if (!config.oauth2.client_id) config.oauth2.client_id = '';
        if (!config.oauth2.client_secret) config.oauth2.client_secret = '';
        if (!config.oauth2.redirect_uri) config.oauth2.redirect_uri = 'http://localhost:3000/callback';
        if (!config.bearer_token) config.bearer_token = '';
        if (!config.services) config.services = {};
        if (!config.services.posting) config.services.posting = {};
        if (!config.services.reading) config.services.reading = {};
        if (!config.services.search) config.services.search = {};
        if (!config.services.media) config.services.media = {};
        if (!config.services.analytics) config.services.analytics = {};
        if (config.services.posting.enabled === undefined) config.services.posting.enabled = true;
        if (config.services.reading.enabled === undefined) config.services.reading.enabled = true;
        if (config.services.search.enabled === undefined) config.services.search.enabled = true;
        if (config.services.media.enabled === undefined) config.services.media.enabled = true;
        if (config.services.analytics.enabled === undefined) config.services.analytics.enabled = true;
        if (!config.defaults) config.defaults = {};
        if (!config.defaults.max_results) config.defaults.max_results = 20;
        if (config.defaults.thread_numbering === undefined) config.defaults.thread_numbering = true;
        if (!config.usage) config.usage = {};
        if (!config.usage.daily_tweet_limit) config.usage.daily_tweet_limit = 50;
        if (!config.security) config.security = {};
        if (config.security.sanitize_content === undefined) config.security.sanitize_content = true;
        if (!config.security.max_tweet_length) config.security.max_tweet_length = 280;
    ">
        <template x-if="config">
            <div>
                <!-- Tab Navigation -->
                <div style="display: flex; gap: 0; border-bottom: 2px solid var(--border-color, #e0e0e0); margin-bottom: 16px;">
                    <template x-for="tab in ['auth', 'services', 'defaults', 'security']">
                        <button @click="activeTab = tab"
                            :style="'padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: 600; margin-bottom: -2px; color: ' + (activeTab === tab ? '#000000' : 'var(--text-secondary, #888)') + '; border-bottom: 2px solid ' + (activeTab === tab ? '#000000' : 'transparent')"
                            x-text="tab === 'auth' ? 'Authentication' : tab.charAt(0).toUpperCase() + tab.slice(1)"></button>
                    </template>
                </div>

                <!-- Auth Tab -->
                <div x-show="activeTab === 'auth'">
                    <div class="section-title">API Tier</div>
                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">API Access Tier</div>
                            <div class="field-description">Pay-Per-Use is recommended (credit-based, all endpoints).</div>
                        </div>
                        <div class="field-control">
                            <select x-model="config.tier">
                                <option value="pay_per_use">Pay-Per-Use (recommended)</option>
                                <option value="free">Free — legacy (1,500 tweets/mo, write-only)</option>
                                <option value="basic">Basic — legacy $200/mo (read + search + write)</option>
                                <option value="pro">Pro — legacy $5,000/mo (full access)</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-title">OAuth 1.0a (Media Upload + Legacy)</div>
                    <div class="section-description">Get these from developer.x.com > Your App > Keys and Tokens.</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">API Key</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth1.api_key" placeholder="API Key">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">API Secret</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth1.api_secret" placeholder="API Secret">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Access Token</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth1.access_token" placeholder="Access Token">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Access Token Secret</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth1.access_token_secret" placeholder="Access Token Secret">
                        </div>
                    </div>

                    <div class="section-title">OAuth 2.0 PKCE (API v2)</div>
                    <div class="section-description">Get Client ID from developer.x.com > Your App > OAuth 2.0 settings.</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Client ID</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth2.client_id" placeholder="Client ID">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Client Secret (optional)</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.oauth2.client_secret" placeholder="Client Secret">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Callback URL</div>
                            <div class="field-description">Must match the URL configured in X Developer Console.</div>
                        </div>
                        <div class="field-control">
                            <input type="text" x-model="config.oauth2.redirect_uri" placeholder="http://localhost:3000/callback">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">OAuth 2.0 Authorization</div>
                            <div class="field-description">Start the flow to authorize API v2 access.</div>
                        </div>
                        <div class="field-control">
                            <button class="btn btn-field" @click="
                                oauth2Status = 'Generating auth URL...'; oauth2StatusColor = '#e65100';
                                (globalThis.fetchApi || fetch)('/api/plugins/x/x_config_api', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({action: 'oauth2_url'})
                                }).then(r => r.json()).then(d => {
                                    if (d.ok && d.url) {
                                        window.open(d.url, '_blank');
                                        oauth2Status = 'Auth page opened — authorize and paste the redirect URL below';
                                        oauth2StatusColor = '#e65100';
                                        oauth2CallbackVisible = true;
                                    } else { oauth2Status = d.error || 'Failed'; oauth2StatusColor = '#c62828'; }
                                }).catch(() => { oauth2Status = 'Error generating URL'; oauth2StatusColor = '#c62828'; });
                            ">Start OAuth 2.0 Flow</button>
                            <span :style="'font-size: 11px; margin-left: 8px; color: ' + oauth2StatusColor" x-text="oauth2Status"></span>
                        </div>
                    </div>

                    <div x-show="oauth2CallbackVisible" style="padding: 10px; background: var(--bg-secondary, #f5f5f5); border-radius: 6px; margin-bottom: 12px;">
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Paste Redirect URL</div>
                                <div class="field-description">After authorizing, paste the full redirect URL from your browser's address bar.</div>
                            </div>
                            <div class="field-control" style="display: flex; gap: 6px; align-items: center;">
                                <input type="text" x-ref="callbackUrl" placeholder="http://localhost:3000/callback?code=...&state=..." style="flex: 1;">
                                <button class="btn btn-field" @click="
                                    var val = $refs.callbackUrl.value.trim();
                                    if (!val) { oauth2CallbackStatus = 'Paste the redirect URL first'; oauth2CallbackStatusColor = '#c62828'; return; }
                                    var code = '', state = '';
                                    try { var u = new URL(val); code = u.searchParams.get('code') || ''; state = u.searchParams.get('state') || ''; } catch(e) { code = val; }
                                    if (!code) { oauth2CallbackStatus = 'Could not find authorization code'; oauth2CallbackStatusColor = '#c62828'; return; }
                                    oauth2CallbackStatus = 'Exchanging code for token...'; oauth2CallbackStatusColor = '#e65100';
                                    (globalThis.fetchApi || fetch)('/api/plugins/x/x_config_api', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({action: 'oauth2_callback', code: code, state: state})
                                    }).then(r => r.json()).then(d => {
                                        if (d.ok) {
                                            oauth2CallbackStatus = 'OAuth 2.0 connected!'; oauth2CallbackStatusColor = '#2e7d32';
                                            oauth2Status = 'Connected'; oauth2StatusColor = '#2e7d32';
                                            setTimeout(() => oauth2CallbackVisible = false, 3000);
                                        } else { oauth2CallbackStatus = d.error || 'Token exchange failed'; oauth2CallbackStatusColor = '#c62828'; }
                                    }).catch(() => { oauth2CallbackStatus = 'Request failed'; oauth2CallbackStatusColor = '#c62828'; });
                                ">Complete Authorization</button>
                            </div>
                            <span :style="'font-size: 11px; color: ' + oauth2CallbackStatusColor" x-text="oauth2CallbackStatus"></span>
                        </div>
                    </div>

                    <div class="section-title">Bearer Token (App-only)</div>
                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Bearer Token</div>
                            <div class="field-description">Optional: for read operations without user context.</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.bearer_token" placeholder="App-only bearer token">
                        </div>
                    </div>
                </div>

                <!-- Services Tab -->
                <div x-show="activeTab === 'services'">
                    <div class="section-title">Enable/Disable Services</div>
                    <div class="section-description">Toggle services on/off. Reading/search/analytics require Pay-Per-Use or Basic+ tier.</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Posting</div>
                            <div class="field-description">All tiers.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.services.posting.enabled"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Reading</div>
                            <div class="field-description">Pay-Per-Use / Basic+.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.services.reading.enabled"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Search</div>
                            <div class="field-description">Pay-Per-Use / Basic+.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.services.search.enabled"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Media Upload</div>
                            <div class="field-description">All tiers.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.services.media.enabled"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Analytics</div>
                            <div class="field-description">Pay-Per-Use / Basic+.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.services.analytics.enabled"><span class="toggler"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Defaults Tab -->
                <div x-show="activeTab === 'defaults'">
                    <div class="section-title">Posting & Search Defaults</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Daily Tweet Limit</div>
                            <div class="field-description">Safety limit per day (independent of API tier limits).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="1500" x-model.number="config.usage.daily_tweet_limit">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Default Max Results</div>
                            <div class="field-description">Maximum results per search query (1-100).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="100" x-model.number="config.defaults.max_results">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Thread numbering</div>
                            <div class="field-description">Add numbering to thread tweets (1/5, 2/5...).</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.defaults.thread_numbering"><span class="toggler"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Security Tab -->
                <div x-show="activeTab === 'security'">
                    <div class="section-title">Security Settings</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Sanitize content</div>
                            <div class="field-description">Strip zero-width chars, normalize Unicode.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.security.sanitize_content"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Max Tweet Length</div>
                            <div class="field-description">Maximum characters per tweet (1-280).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="280" x-model.number="config.security.max_tweet_length">
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
